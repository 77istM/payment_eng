spring.application.name=payment-eng

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:paymentdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 console (available at /h2-console during development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Health, readiness/liveness, and graceful shutdown
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

# Simulated Kafka-like queue and retry behavior
payment.async.consumer-count=4
payment.async.max-retries=5
payment.async.initial-backoff-ms=100
payment.async.backoff-multiplier=2.0
payment.async.queue-capacity=10000
payment.async.poll-timeout-ms=100
payment.async.retry-scheduler-threads=2
